name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Build Landing Page
      - name: Build Landing Page
        working-directory: ./landing-page
        run: |
          npm install
          npm run build

      # Build Simulation
      - name: Build Simulation
        working-directory: ./simulation
        run: |
          npm install
          npm run build
      
      # Organize files
      - name: Organize files
        run: |
          mkdir -p public
          cp -r landing-page/dist/* public/
          mkdir -p public/simulation
          cp -r simulation/dist/* public/simulation/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4