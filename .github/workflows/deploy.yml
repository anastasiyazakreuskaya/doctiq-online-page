name: Build and deploy site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # --- Build landing page ---
      - name: Install and build landing-page
        working-directory: ./landing-page
        run: |
          npm ci --prefer-offline --no-audit
          npm run build
        env:
          CI: true

      # --- Build simulation ---
      - name: Install and build simulation
        working-directory: ./simulation
        run: |
          npm ci --prefer-offline --no-audit
          npm run build
        env:
          CI: true

      # --- Assemble site folder ---
      - name: Prepare site artifact
        run: |
          rm -rf site
          mkdir -p site
          # Copy landing build to root of site
          if [ -d ./landing-page/dist ]; then
            cp -r ./landing-page/dist/* site/
          else
            echo "Warning: landing-page/dist not found"
          fi
          # Put simulation build under /simulation
          if [ -d ./simulation/dist ]; then
            mkdir -p site/simulation
            cp -r ./simulation/dist/* site/simulation/
          else
            echo "Warning: simulation/dist not found"
          fi
          # (Optional) For SPA refresh support, copy index.html to 404.html
          if [ -f site/index.html ]; then
            cp site/index.html site/404.html
          fi
          if [ -f site/simulation/index.html ]; then
            cp site/simulation/index.html site/simulation/404.html
          fi

      # --- Upload artifact for Pages ---
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: site

      # --- Deploy to Pages ---
      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1