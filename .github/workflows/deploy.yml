name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Create public directory early
      - name: Create public directory
        run: mkdir -p public

      # Ensure Node is available
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build Landing Page
      - name: Cache npm (landing-page)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-landing-npm-${{ hashFiles('landing-page/package-lock.json') }}

      - name: Build Landing Page
        working-directory: ./landing-page
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-optional
          fi
          npm run build

      # Build Simulation
      - name: Cache npm (simulation)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-simulation-npm-${{ hashFiles('simulation/package-lock.json') }}

      - name: Build Simulation
        working-directory: ./simulation
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-optional
          fi
          npm run build
      
      # Copy files
      - name: Organize files
        run: |
          cp -r landing-page/dist/* public/
          mkdir -p public/simulation
          cp -r simulation/dist/* public/simulation/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
      
      - uses: actions/deploy-pages@v4